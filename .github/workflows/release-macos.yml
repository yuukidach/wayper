name: Build macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e '.[macos]'

      - name: Build Wayper.app
        run: pyinstaller wayper.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Wayper" \
            --window-size 500 320 \
            --icon-size 80 \
            --icon "Wayper.app" 130 150 \
            --app-drop-link 370 150 \
            --hide-extension "Wayper.app" \
            dist/Wayper.dmg dist/Wayper.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Wayper.dmg
