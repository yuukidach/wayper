name: Build macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e '.[macos]'

      - name: Build Wayper.app
        run: pyinstaller wayper.spec

      - name: Create zip
        run: |
          cd dist
          zip -r Wayper.app.zip Wayper.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Wayper.app.zip
