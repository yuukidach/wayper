name: Build macOS Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pyinstaller

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-cache-macos-${{ hashFiles('wayper/electron/package-lock.json') }}
          restore-keys: electron-cache-macos-

      - name: Install Electron dependencies
        working-directory: wayper/electron
        run: |
          for i in 1 2 3; do
            npm ci --fetch-timeout=300000 && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Build backend + Electron app
        working-directory: wayper/electron
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: wayper/electron/dist/*.dmg
