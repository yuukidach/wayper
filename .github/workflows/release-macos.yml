name: Build Desktop Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pyinstaller

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-cache-macos-${{ hashFiles('wayper/electron/package-lock.json') }}
          restore-keys: electron-cache-macos-

      - name: Install Electron dependencies
        working-directory: wayper/electron
        run: |
          for i in 1 2 3 4 5; do
            npm ci --prefer-offline --fetch-timeout=600000 && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Verify node_modules
        working-directory: wayper/electron
        run: ls -la node_modules/.bin/electron-builder || echo "NOT FOUND"

      - name: Build Python backend
        run: uv run pyinstaller --clean wayper.spec

      - name: Build Electron app
        working-directory: wayper/electron
        run: ./node_modules/.bin/electron-builder

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: wayper/electron/dist/*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pyinstaller

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-cache-windows-${{ hashFiles('wayper/electron/package-lock.json') }}
          restore-keys: electron-cache-windows-

      - name: Install Electron dependencies
        working-directory: wayper/electron
        run: |
          for ($i = 1; $i -le 5; $i++) {
            npm ci --prefer-offline --fetch-timeout=600000
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 5) { exit $LASTEXITCODE }
            Write-Host "Attempt $i failed, retrying in 15s..."
            Start-Sleep -Seconds 15
          }

      - name: Verify node_modules
        working-directory: wayper/electron
        run: if (Test-Path .\node_modules\.bin\electron-builder.cmd) { Get-Item .\node_modules\.bin\electron-builder.cmd } else { exit 1 }

      - name: Build Python backend
        run: uv run pyinstaller --clean wayper.spec

      - name: Build Electron app
        working-directory: wayper/electron
        run: .\node_modules\.bin\electron-builder.cmd --win nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: wayper/electron/dist/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/macos-dmg/*.dmg
            release-artifacts/windows-installer/*.exe
