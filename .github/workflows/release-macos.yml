name: Build macOS Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pyinstaller

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-cache-macos-${{ hashFiles('wayper/electron/package-lock.json') }}
          restore-keys: electron-cache-macos-

      - name: Install Electron dependencies
        working-directory: wayper/electron
        run: |
          for i in 1 2 3 4 5; do
            npm ci --prefer-offline --fetch-timeout=600000 && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Verify node_modules
        working-directory: wayper/electron
        run: ls -la node_modules/.bin/electron-builder || echo "NOT FOUND"

      - name: Build Python backend
        run: uv run pyinstaller --clean wayper.spec

      - name: Build Electron app
        working-directory: wayper/electron
        run: ./node_modules/.bin/electron-builder

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wayper/electron/dist/*.dmg
