<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wayper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>Wayper</h1>
        </div>

        <div class="controls">
            <button id="btn-prev" title="Previous Wallpaper">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="label">Prev</span>
                <kbd>H</kbd>
            </button>
            <button id="btn-next" class="primary" title="Next Wallpaper">
                <span class="label">Next</span>
                <kbd>L</kbd>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="divider"></div>
            <button id="btn-undo" title="Undo Dislike">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                </svg>
                <span class="label">Undo</span>
                <kbd>Z</kbd>
            </button>
            <button id="btn-fav-current" title="Favorite Current">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span class="label">Fav</span>
                <kbd>F</kbd>
            </button>
            <button id="btn-dislike-current" class="danger" title="Dislike (Block)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
                <span class="label">Dislike</span>
                <kbd>X</kbd>
            </button>
        </div>
    </header>

    <div class="app-container">
        <aside>
            <div class="sidebar-section">
                <h3>Library</h3>
                <div class="nav-group">
                     <button id="btn-pool" class="nav-item active">
                        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Pool <span id="count-pool" class="badge"></span><kbd>1</kbd>
                     </button>
                     <button id="btn-favorites" class="nav-item">
                        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span> Favorites <span id="count-favorites" class="badge"></span><kbd>2</kbd>
                     </button>
                     <button id="btn-blocklist" class="nav-item">
                        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span> Blocklist <span id="count-blocklist" class="badge"></span><kbd>3</kbd>
                     </button>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Monitors</h3>
                <div id="monitors-list" class="monitor-list">
                    <!-- Monitor items injected by JS -->
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Purity</h3>
                <div class="purity-toggles">
                    <button id="btn-purity-sfw" class="purity-btn active" data-purity="sfw">SFW<kbd>F1</kbd></button>
                    <button id="btn-purity-sketchy" class="purity-btn" data-purity="sketchy">Sketchy<kbd>F2</kbd></button>
                    <button id="btn-purity-nsfw" class="purity-btn" data-purity="nsfw">NSFW<kbd>F3</kbd></button>
                </div>
            </div>

            <div class="sidebar-spacer"></div>

            <div class="sidebar-section">
                <button id="btn-daemon" class="daemon-btn">
                    Start Daemon
                </button>
                <button id="btn-settings" class="nav-item settings-btn">
                    <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg></span> Settings<kbd>S</kbd>
                </button>
            </div>
        </aside>

        <main id="main-content">
            <!-- Wallpaper Grid -->
            <div id="wallpaper-grid" class="wallpaper-grid">
                <div class="empty-state">
                    <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
                    <p>Loading wallpapers...</p>
                </div>
            </div>

            <!-- Settings View (Hidden by default) -->
            <div id="settings-view" class="hidden settings-container">
                <div class="settings-header">
                    <h2>Settings</h2>
                    <p>Configure Wayper behavior and sources</p>
                </div>

                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>General</h3>
                        <div class="field">
                            <label>Interval (minutes)</label>
                            <input type="number" id="input-interval" min="1" value="5">
                        </div>
                        <div class="field">
                            <label>Disk Quota (MB)</label>
                            <input type="number" id="input-quota" min="100" value="4000">
                        </div>
                        <div class="field">
                            <label>Pool Target (images)</label>
                            <input type="number" id="input-pool-target" min="10" value="30">
                        </div>
                    </div>

                    <div class="settings-card">
                        <h3>Wallhaven Source</h3>
                        <div class="field">
                            <label>Categories (General/Anime/People)</label>
                            <input type="text" id="input-categories" placeholder="111" class="code-font">
                            <small class="hint">111 = All, 010 = Anime only</small>
                        </div>
                        <div class="field">
                            <label>Top Range</label>
                            <select id="input-top-range">
                                <option value="1d">Last Day</option>
                                <option value="3d">Last 3 Days</option>
                                <option value="1w">Last Week</option>
                                <option value="1M">Last Month</option>
                                <option value="3M">Last 3 Months</option>
                                <option value="6M">Last 6 Months</option>
                                <option value="1y">Last Year</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Sorting</label>
                            <select id="input-sorting">
                                <option value="toplist">Toplist</option>
                                <option value="hot">Hot</option>
                                <option value="random">Random</option>
                                <option value="views">Views</option>
                                <option value="favorites">Favorites</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>AI Art Filter</label>
                            <select id="input-ai-art">
                                <option value="0">Allow AI</option>
                                <option value="1">Block AI</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="settings-actions">
                    <button id="btn-cancel-settings" class="btn-text">Cancel</button>
                    <button id="btn-save-settings" class="primary">Save Changes</button>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <div class="status-indicator">
            <div id="daemon-dot" class="dot"></div>
            <span id="daemon-status">Checking daemon...</span>
        </div>
        <div class="status-indicator right">
            <span id="disk-usage">-- MB</span>
        </div>
    </footer>

    <script src="renderer.js"></script>
</body>
</html>
