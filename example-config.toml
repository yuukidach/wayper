api_key = ""  # https://wallhaven.cc/settings/account
# wallhaven_username = ""  # for syncing favorites and tag blacklist to wallhaven.cc
# wallhaven_password = ""
# proxy = "http://127.0.0.1:7897"
download_dir = "~/Pictures/wallpaper"
interval = 300         # seconds between rotations (0 = no auto-rotation)
quota_mb = 4000        # max disk usage
blacklist_ttl_days = 30
pause_on_lock = true       # pause rotation when session is locked
safe_mode = false          # lock purity to SFW only

# [greeter]
# image = "/usr/share/backgrounds/greeter.jpg"
# interval = 12
# sudo_password = ""

# Monitors are auto-detected. Use [[monitors]] only if detection fails.
# [[monitors]]
# name = "DP-1"
# width = 3840
# height = 2160
# orientation = "landscape"

[wallhaven]
categories = "111"     # 1=general, 1=anime, 1=people
top_range = "1M"
sorting = "toplist"
ai_art_filter = 0      # 0=off, 1=on
batch_size = 5
# exclude_tags = ["MetArt", "watermarked"]  # synced to Wallhaven cloud blacklist if credentials are set
# exclude_combos = [["blonde", "nude", "standing"], ["pornstar", "nude"]]
# exclude_uploaders = ["username1", "username2"]  # synced to Wallhaven user blacklist if credentials are set

[transition]
type = "grow"
duration = 0.5
fps = 60
